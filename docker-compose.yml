services:
  postgres:
    image: postgres:15-alpine
    container_name: lawyered_db
    environment:
      POSTGRES_USER: ${DB_USER:-lawyered}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lawyered_secret}
      POSTGRES_DB: ${DB_NAME:-lawyered_wills}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-lawyered}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lawyered_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-lawyered}:${DB_PASSWORD:-lawyered_secret}@postgres:5432/${DB_NAME:-lawyered_wills}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_prod}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: production
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lawyered_frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
